AWSTemplateFormatVersion: "2010-09-09"
Description: >
  arithmetic-mcp | CI/CD Pipeline Stack
  ECR Repository • CodeStar Connection (GitHub) • S3 Artifact Bucket •
  CodeBuild Project • CodePipeline (Source → Build → Deploy to ECS)

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Environment" }
        Parameters: [EnvironmentName]
      - Label: { default: "Source — GitHub" }
        Parameters: [GitHubOwner, GitHubRepository, GitHubBranch]
      - Label: { default: "Container Registry" }
        Parameters: [ECRRepositoryName]
      - Label: { default: "ECS Deploy Target" }
        Parameters: [ECSClusterName, ECSServiceName]
    ParameterLabels:
      GitHubOwner:      { default: "GitHub account / organisation" }
      GitHubRepository: { default: "Repository name" }
      GitHubBranch:     { default: "Branch to track" }
      ECRRepositoryName:{ default: "ECR repository name" }
      ECSClusterName:   { default: "ECS cluster name (from infrastructure stack output)" }
      ECSServiceName:   { default: "ECS service name (from infrastructure stack output)" }

Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  GitHubOwner:
    Type: String
    Description: "GitHub username or organisation that owns the repository"

  GitHubRepository:
    Type: String
    Default: "arithmetic-mcp"
    Description: "GitHub repository name (without the owner prefix)"

  GitHubBranch:
    Type: String
    Default: "main"
    Description: "Branch to trigger the pipeline"

  ECRRepositoryName:
    Type: String
    Default: "arithmetic-mcp"
    Description: "Name for the ECR private repository"

  ECSClusterName:
    Type: String
    Description: "Name of the ECS cluster created by the infrastructure stack"

  ECSServiceName:
    Type: String
    Description: "Name of the ECS service created by the infrastructure stack"

Resources:

  # ── ECR Repository ──────────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Ref ECRRepositoryName
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Retain last 10 tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["latest"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Expire untagged images older than 14 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 14
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── CodeStar Connection (GitHub v2) ─────────────────────────────────────────
  # After stack creation, visit AWS Console → Developer Tools → Connections
  # and click "Update pending connection" to authorise the GitHub OAuth app.
  GitHubConnection:
    Type: AWS::CodeStarConnections::Connection
    Properties:
      ConnectionName: !Sub "${EnvironmentName}-github-conn"
      ProviderType: GitHub
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── S3 Artifact Bucket ──────────────────────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-mcp-pipeline-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldArtifacts
            Status: Enabled
            ExpirationInDays: 30
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyNonTLS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${ArtifactBucket}"
              - !Sub "arn:aws:s3:::${ArtifactBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  # ── CodeBuild IAM Role ──────────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-mcp-codebuild-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/*"
              # S3 artifacts
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactBucket}"
                  - !Sub "arn:aws:s3:::${ArtifactBucket}/*"
              # ECR – push images
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:CompleteLayerUpload
                  - ecr:InitiateLayerUpload
                  - ecr:PutImage
                  - ecr:UploadLayerPart
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: !GetAtt ECRRepository.Arn
              # CodeBuild report groups (optional)
              - Effect: Allow
                Action:
                  - codebuild:CreateReportGroup
                  - codebuild:CreateReport
                  - codebuild:UpdateReport
                  - codebuild:BatchPutTestCases
                Resource: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:report-group/*"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── CodeBuild Project ───────────────────────────────────────────────────────
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${EnvironmentName}-arithmetic-mcp-build"
      Description: "Build & push arithmetic-mcp Docker image to ECR"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true        # required for Docker daemon
        EnvironmentVariables:
          - Name: ECR_REGISTRY
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com"
          - Name: ECR_REPOSITORY
            Value: !Ref ECRRepositoryName
          - Name: CONTAINER_NAME
            Value: "arithmetic-mcp"
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec.yml
      Cache:
        Type: LOCAL
        Modes:
          - LOCAL_DOCKER_LAYER_CACHE
          - LOCAL_SOURCE_CACHE
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/aws/codebuild/${EnvironmentName}-arithmetic-mcp"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── CodePipeline IAM Role ───────────────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-mcp-codepipeline-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelinePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 artifacts
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactBucket}"
                  - !Sub "arn:aws:s3:::${ArtifactBucket}/*"
              # CodeStar Connection (GitHub source)
              - Effect: Allow
                Action: codestar-connections:UseConnection
                Resource: !Ref GitHubConnection
              # CodeBuild
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              # ECS rolling-update deploy
              - Effect: Allow
                Action:
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:DescribeTasks
                  - ecs:ListTasks
                  - ecs:RegisterTaskDefinition
                  - ecs:UpdateService
                Resource: "*"
              # IAM PassRole for ECS task execution role (needed to register task def)
              - Effect: Allow
                Action: iam:PassRole
                Resource: "*"
                Condition:
                  StringEqualsIfExists:
                    iam:PassedToService:
                      - ecs-tasks.amazonaws.com
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ── CodePipeline ────────────────────────────────────────────────────────────
  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${EnvironmentName}-arithmetic-mcp-pipeline"
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      PipelineType: V2
      Stages:
        # ── Stage 1: Source ──────────────────────────────────────────────────
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: "1"
              Configuration:
                ConnectionArn: !Ref GitHubConnection
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepository}"
                BranchName: !Ref GitHubBranch
                OutputArtifactFormat: CODE_ZIP
                DetectChanges: true
              OutputArtifacts:
                - Name: SourceArtifact
              RunOrder: 1

        # ── Stage 2: Build (Docker image → ECR) ─────────────────────────────
        - Name: Build
          Actions:
            - Name: BuildAndPushImage
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceArtifact
              OutputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

        # ── Stage 3: Deploy (ECS rolling update) ────────────────────────────
        - Name: Deploy
          Actions:
            - Name: DeployToECS
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: ECS
                Version: "1"
              Configuration:
                ClusterName: !Ref ECSClusterName
                ServiceName: !Ref ECSServiceName
                FileName: imagedefinitions.json
              InputArtifacts:
                - Name: BuildArtifact
              RunOrder: 1

      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ECRRepositoryURI:
    Description: "Full ECR repository URI"
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepositoryName}"
    Export:
      Name: !Sub "${EnvironmentName}-ECRRepositoryURI"

  PipelineURL:
    Description: "AWS Console URL for the CodePipeline"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${Pipeline}/view"

  GitHubConnectionArn:
    Description: "CodeStar Connection ARN — must be AUTHORISED in the console before the pipeline can run"
    Value: !Ref GitHubConnection

  ArtifactBucketName:
    Value: !Ref ArtifactBucket
