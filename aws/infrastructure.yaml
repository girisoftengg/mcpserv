AWSTemplateFormatVersion: "2010-09-09"
Description: >
  arithmetic-mcp | Infrastructure Stack
  VPC • Public/Private Subnets • NAT Gateway • Security Groups •
  ACM Certificate • ALB (HTTP→HTTPS redirect) • ECS Fargate Cluster •
  Task Definition • Service • CloudWatch Logs

# ─────────────────────────────────────────────────────────────────────────────
# Metadata – console parameter grouping
# ─────────────────────────────────────────────────────────────────────────────
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Environment" }
        Parameters: [EnvironmentName]
      - Label: { default: "Domain / TLS" }
        Parameters: [DomainName, HostedZoneId, ExistingCertificateArn]
      - Label: { default: "Network" }
        Parameters: [VpcCIDR, PublicSubnet1CIDR, PublicSubnet2CIDR,
                     PrivateSubnet1CIDR, PrivateSubnet2CIDR]
      - Label: { default: "Container" }
        Parameters: [ImageUri, ContainerPort]
      - Label: { default: "ECS Sizing" }
        Parameters: [TaskCpu, TaskMemory, ServiceDesiredCount]
    ParameterLabels:
      EnvironmentName:     { default: "Environment name (prefix for resources)" }
      DomainName:          { default: "Fully-qualified domain (e.g. mcp.example.com)" }
      HostedZoneId:        { default: "Route53 Hosted Zone ID (for DNS-validated ACM)" }
      ExistingCertificateArn: { default: "Existing ACM certificate ARN (leave blank to create one)" }
      ImageUri:            { default: "ECR image URI (updated by pipeline)" }
      ContainerPort:       { default: "Container HTTP port" }
      TaskCpu:             { default: "ECS task CPU units (256 = 0.25 vCPU)" }
      TaskMemory:          { default: "ECS task memory (MiB)" }
      ServiceDesiredCount: { default: "Number of running tasks" }

# ─────────────────────────────────────────────────────────────────────────────
# Parameters
# ─────────────────────────────────────────────────────────────────────────────
Parameters:
  EnvironmentName:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

  DomainName:
    Type: String
    Description: "e.g. mcp.example.com — used for ALB listener and ACM certificate"

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 Hosted Zone ID for DNS validation. Required when ExistingCertificateArn is blank."

  ExistingCertificateArn:
    Type: String
    Default: ""
    Description: "Provide an ACM certificate ARN to skip automatic certificate creation."

  VpcCIDR:
    Type: String
    Default: "10.0.0.0/16"

  PublicSubnet1CIDR:
    Type: String
    Default: "10.0.1.0/24"

  PublicSubnet2CIDR:
    Type: String
    Default: "10.0.2.0/24"

  PrivateSubnet1CIDR:
    Type: String
    Default: "10.0.10.0/24"

  PrivateSubnet2CIDR:
    Type: String
    Default: "10.0.20.0/24"

  ImageUri:
    Type: String
    Description: "Full ECR image URI including tag, e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/arithmetic-mcp:abc12345"

  ContainerPort:
    Type: Number
    Default: 8000

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "3072", "4096", "5120", "6144", "7168", "8192"]

  ServiceDesiredCount:
    Type: Number
    Default: 2
    MinValue: 1

# ─────────────────────────────────────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  CreateCertificate: !Equals [!Ref ExistingCertificateArn, ""]
  HasHostedZone:     !Not [!Equals [!Ref HostedZoneId, ""]]

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  # ── Public Subnets ──────────────────────────────────────────────────────────
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-2"

  # ── Private Subnets ─────────────────────────────────────────────────────────
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PrivateSubnet1CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PrivateSubnet2CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-2"

  # ── NAT Gateway (single AZ to save cost; duplicate for HA) ─────────────────
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-nat"

  # ── Route Tables ────────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-public-rt"

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-private-rt"

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  # ── Security Groups ─────────────────────────────────────────────────────────
  # ALB: accepts traffic from internet on 80 and 443
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ALB - allow HTTP/HTTPS from internet"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: "HTTP from internet"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: "HTTPS from internet"
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          DestinationSecurityGroupId: !Ref ECSSecurityGroup
          Description: "Forward to ECS containers"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-alb-sg"

  # ECS: only accepts traffic from ALB
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ECS Fargate - allow traffic from ALB only"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: "MCP HTTP from ALB"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: "Allow all outbound (ECR pull, CloudWatch logs via NAT)"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-ecs-sg"

  # ── ACM Certificate ─────────────────────────────────────────────────────────
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: CreateCertificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        !If
          - HasHostedZone
          - - DomainName: !Ref DomainName
              HostedZoneId: !Ref HostedZoneId
          - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-cert"

  # ── Application Load Balancer ───────────────────────────────────────────────
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-mcp-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # Target group (ECS service registers tasks here)
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-mcp-tg"
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip           # required for Fargate
      HealthCheckProtocol: HTTP
      HealthCheckPort: !Sub "${ContainerPort}"
      HealthCheckPath: /mcp
      # FastMCP responds with 4xx to a plain GET on /mcp — treat as healthy
      Matcher:
        HttpCode: "200-405"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # Listener: HTTP → redirect to HTTPS
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # Listener: HTTPS → forward to ECS target group
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !If
            - CreateCertificate
            - !Ref Certificate
            - !Ref ExistingCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── ECS ─────────────────────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EnvironmentName}-mcp-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # CloudWatch log group for container stdout/stderr
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}-arithmetic-mcp"
      RetentionInDays: 30

  # ECS Task Execution Role (ECR pull + CloudWatch logs)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-mcp-task-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ECS Task Role (runtime permissions for the container itself)
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-mcp-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # Add additional inline policies here if the MCP tools need AWS access
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ECS Task Definition
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-arithmetic-mcp"
      NetworkMode: awsvpc          # required for Fargate
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: arithmetic-mcp     # must match CONTAINER_NAME in buildspec.yml
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: MCP_TRANSPORT
              Value: streamable-http
            - Name: HOST
              Value: "0.0.0.0"
            - Name: PORT
              Value: !Sub "${ContainerPort}"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD
              - python
              - "-c"
              - "import socket,sys;s=socket.socket();s.settimeout(5);r=s.connect_ex(('127.0.0.1',8000));s.close();sys.exit(r)"
            Interval: 30
            Timeout: 10
            Retries: 3
            StartPeriod: 60
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ECS Service
  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HTTPSListener
    Properties:
      ServiceName: !Sub "${EnvironmentName}-arithmetic-mcp-svc"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref ServiceDesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !Ref ECSSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: arithmetic-mcp
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !Sub "${EnvironmentName}-VpcId"

  ECSClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${EnvironmentName}-ECSClusterName"

  ECSServiceName:
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${EnvironmentName}-ECSServiceName"

  LoadBalancerDNS:
    Description: "ALB DNS name — create a CNAME for your domain pointing here"
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub "${EnvironmentName}-ALBDns"

  LoadBalancerHostedZoneId:
    Description: "ALB Hosted Zone ID (for Route53 alias records)"
    Value: !GetAtt LoadBalancer.CanonicalHostedZoneID

  MCPEndpointURL:
    Description: "HTTPS endpoint for the Arithmetic MCP server"
    Value: !Sub "https://${DomainName}/mcp"

  TargetGroupArn:
    Value: !Ref TargetGroup
    Export:
      Name: !Sub "${EnvironmentName}-TargetGroupArn"

  CertificateArn:
    Description: "ACM Certificate ARN in use"
    Value: !If
      - CreateCertificate
      - !Ref Certificate
      - !Ref ExistingCertificateArn
